<!-- services/product/app/templates/cart.html -->
<!-- 역할: 장바구니 페이지 (EC2-1) -->
<!-- 데이터 흐름: localStorage → JS 렌더링 / 결제 버튼 → API Gateway → EC2-4 -->

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장바구니 - 우아한 비버 쇼핑몰</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        /* =============================================
           디자인 토큰 (CSS 변수) - main.html과 동일하게 유지
           ============================================= */
        :root {
            --bg-base: #ffffff;
            --bg-surface: #ffffff;
            --bg-secondary: #f8fafc;
            --primary: #2c86c1;
            --primary-glow: rgba(44, 134, 193, 0.15);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-base); color: var(--text-main); line-height: 1.6; -webkit-font-smoothing: antialiased; }

        /* 헤더 - main.html과 동일한 sticky + 블러 */
        header { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 12px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }

        .logo a { display: flex; align-items: center; text-decoration: none; }
        .logo img { height: 30px; }

        .header-nav { display: flex; gap: 24px; align-items: center; }
        .header-nav a.nav-link { text-decoration: none; color: var(--text-muted); font-size: 0.88rem; font-weight: 500; transition: color 0.3s; letter-spacing: -0.3px; }
        .header-nav a.nav-link:hover { color: var(--primary); }

        /* 카트 버튼 - main.html과 동일 */
        .cart-btn { text-decoration: none; background: var(--bg-base); color: var(--primary) !important; padding: 7px 18px; border-radius: 30px; border: 1.5px solid var(--primary); font-size: 0.85rem !important; font-weight: 700; transition: all 0.3s ease; }
        .cart-btn:hover { background: var(--primary); color: #fff !important; box-shadow: 0 6px 15px var(--primary-glow); }

        /* 본문 레이아웃 - main.html보다 좁게 (800px) */
        .container { max-width: 800px; margin: 60px auto; padding: 0 24px; }
        h2 { font-size: 1.8rem; font-weight: 900; margin-bottom: 40px; letter-spacing: -1px; }

        /* 장바구니 아이템 카드 */
        .cart-item { display: flex; align-items: center; justify-content: space-between; padding: 24px; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 16px; margin-bottom: 16px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02); }
        .item-info { display: flex; align-items: center; gap: 24px; }
        .item-info h3 { font-size: 1.1rem; font-weight: 700; margin: 0; }
        .item-info p { color: var(--text-muted); margin-top: 4px; }
        .emoji { font-size: 3rem; background: var(--bg-secondary); padding: 10px; border-radius: 12px; }

        /* 장바구니 비었을 때 표시 */
        .empty-msg { text-align: center; color: var(--text-muted); padding: 80px 20px; background: var(--bg-secondary); border-radius: 16px; border: 1px solid var(--border-color); }

        /* 총 결제금액 박스 */
        .total-box { margin-top: 40px; padding: 24px; background: var(--bg-secondary); border-radius: 16px; border: 1px solid var(--border-color); text-align: right; font-size: 1.2rem; font-weight: bold; }
        .total-price { color: var(--primary); font-size: 2rem; font-weight: 900; margin-left: 10px; }

        /* 결제 버튼 */
        .checkout-btn { display: block; width: 100%; margin-top: 24px; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 14px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: background 0.3s; box-shadow: 0 8px 16px var(--primary-glow); }
        .checkout-btn:hover { background: #1a6596; }

        /* 개별 아이템 삭제 버튼 */
        .clear-btn { background: #fff; color: #ef4444; border: 1px solid #ef4444; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.3s; }
        .clear-btn:hover { background: #ef4444; color: #fff; }

        footer { border-top: 1px solid var(--border-color); color: var(--text-muted); text-align: center; padding: 32px 24px; font-size: 0.85rem; margin-top: 80px; }
    </style>
</head>
<body>

    <!-- =============================================
         헤더 - main.html과 구조 동일
         - cart-count: JS updateCartCount()가 수량 갱신
         ============================================= -->
    <header>
        <div class="logo">
            <a href="/"><img src="/static/logo.png" alt="우아한 비버"></a>
        </div>
        <nav class="header-nav">
            <a href="https://woowabeavers.cloud/login" class="nav-link">로그인</a>
            <!-- 수량은 JS updateCartCount()가 페이지 로드 시 갱신 -->
            <a href="/cart" class="cart-btn" id="cart-count">Cart (0)</a>
        </nav>
    </header>

    <!-- =============================================
         장바구니 본문
         - cart-container: JS loadCart()가 아이템 카드 동적 렌더링
             - total-price: loadCart()에서 합산 후 주입
         ============================================= -->
    <div class="container">
        <h2>내 장바구니 🛒</h2>
        <div id="cart-container"></div>

        <div class="total-box">
            총 결제 금액 <span class="total-price" id="total-price">0</span> ₩
        </div>

        <!-- TODO: [EC2-4 연동] 서버 기동 + CORS 도메인 추가 확인 후 버튼 텍스트 "결제하기"로 변경 -->
        <button class="checkout-btn" onclick="checkout()">결제하기 (API 연동 대기중)</button>
    </div>

    <footer>
        © 2026 woowabeavers. All rights reserved.
    </footer>

    <script>
        /**
         * XSS 방지용 HTML 이스케이프 함수
         * - localStorage에서 읽은 값을 innerHTML에 넣기 전에 반드시 거침
         * - <, >, &, ", ' 를 HTML 엔티티로 변환해서 스크립트 삽입 차단
         */
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        /**
         * 장바구니 목록 렌더링
         * - localStorage 'beaver_cart' 배열을 읽어 카드 HTML 생성
         * - 비어있으면 empty-msg 표시
         * - 총액은 price * quantity 합산
         */
        function loadCart() {
            let cart = JSON.parse(localStorage.getItem('beaver_cart')) || [];
            let container = document.getElementById('cart-container');
            let totalPriceEl = document.getElementById('total-price');
            let total = 0;

            updateCartCount(cart);

            if (cart.length === 0) {
                container.innerHTML = `<div class="empty-msg">장바구니가 텅 비었어요! 나뭇가지라도 주워올까요? 🦫</div>`;
                totalPriceEl.innerText = "0";
                return;
            }

            let html = "";
            cart.forEach((item, index) => {
                total += item.price * item.quantity;
                html += `
                    <div class="cart-item">
                        <div class="item-info">
                            <span class="emoji">${escapeHtml(item.emoji)}</span>
                            <div>
                                <h3>${escapeHtml(item.name)}</h3>
                                <!-- toLocaleString(): 가격 1000단위 쉼표 -->
                                <p>${item.price.toLocaleString()} ₩ x ${item.quantity}개</p>
                            </div>
                        </div>
                        <!-- removeItem에 index 전달 → splice로 해당 항목만 제거 -->
                        <button class="clear-btn" onclick="removeItem(${index})">삭제</button>
                    </div>
                `;
            });
            container.innerHTML = html;
            totalPriceEl.innerText = total.toLocaleString();
        }

        /**
         * 특정 아이템 삭제
         * - index로 splice 후 localStorage 업데이트
         * - loadCart() 재호출로 화면 갱신
         *
         * @param {number} index - cart 배열에서의 위치
         */
        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('beaver_cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('beaver_cart', JSON.stringify(cart));
            loadCart();
        }

        /**
         * 헤더 카트 버튼 수량 업데이트
         * - main.html의 updateCartCount()와 동일한 로직
         *
         * @param {Array} cart - 현재 장바구니 배열
         */
        function updateCartCount(cart) {
            let total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').innerText = `Cart (${total})`;
        }

        // API Gateway 엔드포인트 (→ EC2-4 주문/결제 서버)
        const ORDER_API = "https://c9muocyrwc.execute-api.ap-northeast-2.amazonaws.com/api/checkout";

        /**
         * 결제 처리
         * - 장바구니 아이템별로 POST /api/checkout 호출
         * - 요청 형식: { user_id, item_id, price, quantity }
         * - 성공 시 localStorage 비우고 화면 갱신
         */
        async function checkout() {
            let cart = JSON.parse(localStorage.getItem('beaver_cart')) || [];
            if (cart.length === 0) return alert("장바구니가 비어있습니다.");

            // TODO: [EC2-2 연동] 로그인 완료 후 GET /api/auth/me 호출해서 실제 user_id로 교체
            // EC2-2 담당자에게 /api/auth/me 응답 스펙(user_id 필드명) 확인 필요
            const userId = "temp_user";

            try {
                for (const item of cart) {
                    const res = await fetch(ORDER_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user_id: userId,
                            item_id: item.itemId,  // main.html addToCart()에서 itemId로 저장됨
                            price: item.price,
                            quantity: item.quantity
                        })
                    });

                    if (!res.ok) {
                        const err = await res.json();
                        alert(`결제 실패: ${err.detail || '알 수 없는 오류'}`);
                        return;
                    }
                }

                alert("결제가 완료되었습니다!");
                localStorage.removeItem('beaver_cart');
                loadCart();
            } catch (e) {
                alert("서버 연결 오류가 발생했습니다. CORS 설정을 확인하세요.");
                console.error(e);
            }
        }

        // 페이지 로드 시 장바구니 렌더링
        window.onload = loadCart;
    </script>
</body>
</html>
