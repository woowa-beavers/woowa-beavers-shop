<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>woowa-beavers 회원가입</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="auth-container">
      <h2>woowa-beavers 회원가입</h2>
      <form id="signupForm">
        <input type="text" name="username" id="username" placeholder="아이디" required />
        <input type="password" name="password" id="password" placeholder="비밀번호" required />
        <input type="password" id="passwordConfirm" placeholder="비밀번호 확인" required />
        <button type="submit">가입하기</button>
      </form>
      <div class="footer-link">
        이미 계정이 있으신가요? <a href="/login">로그인</a>
      </div>
    </div>

    <script src="/static/js/auth.js?v=2"></script>
  </body>
</html>
